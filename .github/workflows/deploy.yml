name: Deploy MASOL FDS Chatbot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key using Python
        run: |
          python3 - <<PYEOF
          import os
          key = os.environ.get('OPENAI_API_KEY', '')
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          content = content.replace('__OPENAI_API_KEY__', key)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          if '__OPENAI_API_KEY__' in content:
              print('ERROR: placeholder no reemplazado')
              exit(1)
          else:
              print(f'OK: API key inyectada ({len(key)} caracteres)')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
